services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tonrings
      POSTGRES_USER: tonrings
      POSTGRES_PASSWORD: tonrings
    ports:
      - "5432:5432"
    volumes:
      - tonrings_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tonrings"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  tonrings_db:
